# ai-harness-file-rules 設定ファイル
# 配置先: <プロジェクトルート>/.claude/harness/config/ai-harness-file-rules.yml
# 書き込み系ツール（Write / Edit / MultiEdit）の PostToolUse で、書き込んだソースファイルを
# tree-sitter で AST 解析し、ファイル単位のコード構造ルールに反したら deny（exit 2）する。

# 検査エントリ。ファイルが pattern にマッチしたら（先頭優先）そのエントリの規則を適用する。
files:
  - pattern: "src/main/java/**/*.java"
    lines: 500              # 1 ファイルの最大行数（"*" または省略で無制限）
    line-length: 120        # 1 行の最大文字数（"*" または省略で無制限）
    tab-width: 4            # line-length でタブを何文字と数えるか（省略で 4）
    blank-line: 10          # 空行なしで続けられる行数の上限（"*" または省略で無制限）
    class:
      one-file: true        # 1 ファイル = 1 クラス（トップレベルのクラス相当は 1 個まで）
      force: true           # 必ずクラスが要る（メソッドのみのファイル禁止）
    method:
      num: 5                # ファイル内メソッド数の上限（"*" または省略で無制限）
      lines: 50             # 1 メソッドの最大行数（"*" または省略で無制限）
      in-class: true        # true でクラス外メソッド／クラス外操作（if/for/式文 等）を禁止（省略で無効）
    comment:
      class:
        require: true       # クラスに doc コメント（javadoc）が必須
        min-length: 10      # 説明文の最低文字数（"*" または省略で無制限）
      method:
        require: true       # メソッドに doc コメントが必須
        min-length: 10
        params: true        # 全ての引数が doc コメントに記述されていること
        params-strict: true # シグネチャに無い引数の記述を禁止（リネーム・削除の取り残しを検出）
    unused: true             # 未使用 import／変数／関数／クラスを検出（下記メモ参照。要 lsp: 有効化）

  - pattern: "frontend/main/**/*.ts"
    lines: 300
    line-length: 100
    method:
      lines: 40
    # class・comment を書かなければ、その検査はしない。

# ai-harness-main --fire での能動スキャン設定。
# 上記 pattern に合致する全ソースを走査し、規則に違反するファイルがあれば exit 2。
#
# exclude に一致するディレクトリを部分木ごと除外し（どの深さでも枝刈り）、一致するファイルも走査から外す。
# exclude は pattern と同じ glob を解釈する（**=任意段のディレクトリ / *=区切りを跨がない任意長 / ?=任意1文字）。
# フルパスと各 / 区切りサフィックスに照合されるため、名前指定・パス指定・glob のいずれも書ける:
#   - node_modules      … どの深さの node_modules も除外
#   - .claude/harness   … ハーネス管理ディレクトリをパス指定で除外
#   - "**/dist"         … 任意段下の dist を除外
#
# gitignore: true にすると、git が無視する（未追跡かつ ignore の）ファイル／ディレクトリも走査対象から外す。
# 各階層の .gitignore・否定(!)・core.excludesFile・.git/info/exclude を尊重（git に問い合わせる）。
# git 未導入・非リポジトリのときは警告して無効化し、スキャンは継続する。既定は false。
fire:
  gitignore: true
  exclude:
    - .git
    - node_modules

# メモ:
#   - 無制限にしたい項目はキーを省略するか "*"（YAML のエイリアス回避のため必ず引用符で囲む）。
#   - line-length は表示幅ではなく文字の個数で数える（全角・半角とも 1 文字）。タブのみ tab-width 文字。
#   - tab-width は 1 以上の整数のみ（"*" 不可）。line-length を書かなければ使われない。
#   - blank-line は空行なしで続く行数を数える。空行（空白のみの行を含む）とコメント行が区切りとなり数えを 0 に戻す。
#     コメント行は AST 由来のため文字列リテラル内の // は区切りにならない。Python の docstring は区切りとして扱う。
#   - クラス概念の無い C / Go / Rust では class 検査（class.* / method.in-class / comment.class）は自動でスキップされる。
#   - method.in-class=true はクラス外のメソッド定義と、import/export を除くトップレベルの操作文を deny する。
#   - どの pattern にもマッチしないファイルは管理対象外（許可）。テスト等は pattern に含めなければよい。
#   - 設定が不正／有効エントリ無しの場合は対応言語のソース書き込みを全 deny（フェイルクローズ）。
#   - unused は tree-sitter の自前解析ではなく、ai-harness-main の LSP 連携機能を使う。対象言語を
#     common.yml の lsp: で有効化していなければ何も検出しない（エラーにはならない。ログに警告だけ出る）。
#     hook（Write/Edit/MultiEdit の PostToolUse）では LSP の非同期キャッシュを読むだけで待たないため、
#     編集した直後の hook では反映されず、次にそのファイルを触った hook から検出されることが多い。
#     ai-harness-main --fire の能動スキャンではファイルごとに LSP からの応答を待つため、hook より正確に
#     検出できる代わりに、対象言語の LSP が未起動だと最初の1ファイルはインストール・起動待ちが乗る
#     （数秒〜数十秒。2ファイル目以降は起動済みなので速い）。
#
# doc コメントの書式（言語の標準に合わせる。実装コメント // は doc と認めない。Go を除く）:
#   Java        /** */          @param 名前 説明
#   C / C++     /** */ /// /*!  @param 名前 説明（\param・@param[in] 名前 も可）
#   TypeScript  /** */          @param 名前 - 説明
#   Rust        /// /** */      # Arguments セクションに * `名前` - 説明
#   Go          //              列挙タグが無いため、本文中に引数名が現れれば記述ありとみなす
#   Python      docstring       Google スタイルの Args: セクションに 名前: 説明
#
#   params は引数の記述漏れを、params-strict はシグネチャに無い引数の記述を deny する（コメントの乖離防止）。
#   名前を特定できない引数は記述を求めない（Python の self/cls、Rust の self、Go のレシーバ、TS の分割代入）。
