# ai-harness-file-rules 設定ファイル（有効化時に自動生成された雛形）。
# 既定のエントリはどのファイルにもマッチしないプレースホルダ＝実質何も検査しません。
# 検査するには pattern と各規則（lines / line-length / blank-line / class / method / comment）を
# 実プロジェクトに合わせて書き換えてください。
# （files を空にすると有効エントリが無い＝対応言語のソース書き込みが全 deny＝フェイルクローズになります。）
files:
  - pattern: "__ai_harness_placeholder__/**/*.__disabled__"
    # lines: 500
    # line-length: 120   # 1 行の最大文字数（全角・半角とも 1 文字）
    # tab-width: 4       # line-length でタブを何文字と数えるか（省略で 4）
    # blank-line: 10     # 空行なしで続けられる行数の上限（空行・コメント行が区切り）
    # class:
    #   one-file: true
    #   extend: "path/to/Base.ext"  # 指定ファイルで宣言されたクラスを必ず継承（配列不可・単一パス）
    # method:
    #   num: 5
    #   lines: 50
    # comment:
    #   method:
    #     require: true
