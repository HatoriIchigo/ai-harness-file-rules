# ai-harness-file-rules 設定ファイル（有効化時に自動生成された雛形）。
# 既定のエントリはどのファイルにもマッチしないプレースホルダ＝実質何も検査しません。
# 検査するには pattern と各規則（lines / class / method / comment）を実プロジェクトに合わせて
# 書き換えてください。
# （files を空にすると有効エントリが無い＝対応言語のソース書き込みが全 deny＝フェイルクローズになります。）
files:
  - pattern: "__ai_harness_placeholder__/**/*.__disabled__"
